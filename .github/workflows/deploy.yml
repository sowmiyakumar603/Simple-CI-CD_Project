name: Build, Push and Deploy

on:
  push:
    branches:
      - dev
      - QA
      - UAT
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sleeky-frontend:${TAG} ./sleeky-frontend

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sleeky-frontend:${TAG}

      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sleeky-backend:${TAG} ./sleeky-backend

      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sleeky-backend:${TAG}

  # Auto deploy for dev, QA, UAT
  deploy-nonprod:
    needs: build-and-push
    if: github.ref_name != 'master'
    runs-on: ubuntu-latest

    env:
      TAG: ${{ github.ref_name }}

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sleeky-frontend:${TAG}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sleeky-backend:${TAG}

            docker stop sleeky-frontend || true
            docker rm sleeky-frontend || true

            docker stop sleeky-backend || true
            docker rm sleeky-backend || true

            docker run -d \
              --name sleeky-frontend \
              -p 3000:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/sleeky-frontend:${TAG}

            docker run -d \
              --name sleeky-backend \
              -p 8080:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/sleeky-backend:${TAG}

  # Manual approval only for master
  deploy-prod:
    needs: build-and-push
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    environment: prod

    env:
      TAG: ${{ github.ref_name }}

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sleeky-frontend:${TAG}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sleeky-backend:${TAG}

            docker stop sleeky-frontend || true
            docker rm sleeky-frontend || true

            docker stop sleeky-backend || true
            docker rm sleeky-backend || true

            docker run -d \
              --name sleeky-frontend \
              -p 3000:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/sleeky-frontend:${TAG}

            docker run -d \
              --name sleeky-backend \
              -p 8080:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/sleeky-backend:${TAG}
